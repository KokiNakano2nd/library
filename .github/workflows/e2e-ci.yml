name: Docker Compose E2E CI

on:
  push:
    paths:
      - ".github/workflows/e2e-ci.yml"
      - "docker-compose.yml"
      - "backend/**"
      - "frontend/**"
      - "test/**"
  pull_request:
    paths:
      - ".github/workflows/e2e-ci.yml"
      - "docker-compose.yml"
      - "backend/**"
      - "frontend/**"
      - "test/**"

jobs:
  docker-compose-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Docker Compose services
        working-directory: .
        run: docker compose up -d --build

      - name: Show Docker Compose status
        working-directory: .
        run: docker compose ps

      - name: Wait for backend health endpoint
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $deadline = (Get-Date).AddMinutes(3)

          while ((Get-Date) -lt $deadline) {
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:8000/health" -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -eq 200) {
                exit 0
              }
            }
            catch {
            }

            Start-Sleep -Seconds 2
          }

          throw "Backend health endpoint did not become ready in time."

      - name: Wait for frontend books page
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $deadline = (Get-Date).AddMinutes(3)

          while ((Get-Date) -lt $deadline) {
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:3000/books" -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 500) {
                exit 0
              }
            }
            catch {
            }

            Start-Sleep -Seconds 2
          }

          throw "Frontend books page did not become ready in time."

      - name: Run Docker Compose Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          DOCKER_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
          PLAYWRIGHT_EVIDENCE_DIR: ../test/evidence/step21-playwright
        run: >
          npx playwright test
          e2e/docker-compose-smoke.spec.ts
          e2e/docker-compose-env-migration.spec.ts
          e2e/docker-compose-connectivity.spec.ts
          e2e/docker-compose-books-crud.spec.ts
          --reporter=html

      - name: Show Docker Compose logs on failure
        if: failure()
        working-directory: .
        run: docker compose logs --no-color

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step21-playwright-evidence
          path: test/evidence/step21-playwright
          if-no-files-found: warn

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step21-playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: warn

      - name: Stop Docker Compose services
        if: always()
        working-directory: .
        run: docker compose down -v
